# Model arguments
model_name_or_path: Qwen/Qwen2.5-Math-1.5B
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2

# Original data training arguments
# dataset_name: open-r1/OpenR1-Math-220k
# system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer. Respond in the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>"

dataset_name: DigitalLearningGmbH/MATH-lighteval
dataset_config: default
system_prompt: "You are a helpful assistant. You should think step-by-step and put your final answer within \\boxed{{}}."

# dataset_name: knoveleng/open-s1
# system_prompt: "You are a helpful assistant. You should think step-by-step and put your final answer within \\boxed{{}}."

# GRPO trainer config
beta: 0.0
bf16: true
use_vllm: false
gradient_accumulation_steps: 4
max_grad_norm: 1.0
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: Qwen2.5-1.5B-Open-R1-GRPO
hub_strategy: every_save
log_completions: false
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 768
max_completion_length: 2048
# max_steps: 2000
num_train_epochs: 1
num_generations: 8
# num_train_epochs: 1
output_dir: /vol/research/ly0008/xch/code/CEWE_/output_logs/CEWE/GRPO/Qwen2.5-Math-1.5B
overwrite_output_dir: true
per_device_eval_batch_size: 8
per_device_train_batch_size: 8
push_to_hub: false
report_to:
- wandb
reward_funcs:
- cewe
reward_weights:
- 1.0
save_strategy: epoch"
# save_steps: 2000    
save_total_limit: 1
seed: 42
do_eval: false
warmup_ratio: 0.1
# eval_strategy: "steps"
# eval_steps: 1
