# Model arguments
model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
model_revision: main
torch_dtype: bfloat16
# attn_implementation: flash_attention_2

# Data training arguments
dataset_name: openai/gsm8k
dataset_config: main
# system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer. Respond in the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>"
system_prompt: "You are a helpful assistant. You should think step-by-step and put your final answer within \\boxed{{}}."


# GRPO trainer config
beta: 0.0
bf16: true
use_vllm: false
vllm_device: auto
vllm_gpu_memory_utilization: 0.7
do_eval: false
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: Qwen2.5-1.5B-Open-R1-GRPO
hub_strategy: every_save
learning_rate: 2.0e-05
log_completions: false
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 512
max_completion_length: 1024
# change gen to 8, so that we can train faster.
# num_train_epochs: 1
max_steps: 300
output_dir: /mnt/beegfs/home/han/offline_rl/code/GPG/open-r1/output_logs/CEWE/GPG/Qwen2.5-1.5B-Instruct
overwrite_output_dir: true
num_generations: 8
per_device_eval_batch_size: 8
per_device_train_batch_size: 8
push_to_hub: false
report_to:
- wandb
reward_funcs:
- cewe
reward_weights:
- 1.0
#save_strategy: "epoch"
#save_total_limit: 1
save_strategy: "steps"
save_steps: 200
save_total_limit: 8
seed: 42
warmup_ratio: 0.1
