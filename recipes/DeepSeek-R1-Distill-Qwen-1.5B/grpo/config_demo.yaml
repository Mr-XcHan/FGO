# Model arguments
model_name_or_path: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
model_revision: main
torch_dtype: bfloat16
# attn_implementation: flash_attention_2

# Original data training arguments
# dataset_name: open-r1/OpenR1-Math-220k
# system_prompt: "You are a helpful AI Assistant that provides well-reasoned and detailed responses. You first think about the reasoning process as an internal monologue and then provide the user with the answer. Respond in the following format: <think>\n...\n</think>\n<answer>\n...\n</answer>"

dataset_name: DigitalLearningGmbH/MATH-lighteval
dataset_config: default
system_prompt: "You are a helpful assistant. You should think step-by-step and put your final answer within \\boxed{{}}."

# GRPO trainer config
beta: 0.0
bf16: true
vllm_device: auto
vllm_gpu_memory_utilization: 0.7
do_eval: false
gradient_accumulation_steps: 2
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
hub_model_id: DeepSeek-R1-Distill-Qwen-1.5B-GRPO
hub_strategy: every_save
learning_rate: 1.0e-06
log_completions: false
log_level: info
logging_first_step: true
logging_steps: 1
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 768
max_completion_length: 2048
# max_steps: 800
num_train_epochs: 1
num_generations: 8
output_dir: /mnt/beegfs/home/han/offline_rl/code/GPG/open-r1/output_logs/CEWE/GRPO/DeepSeek-R1-Distill-Qwen-1.5B
overwrite_output_dir: true
per_device_eval_batch_size: 8
per_device_train_batch_size: 8
push_to_hub: false
report_to:
- wandb
reward_funcs:
- cewe
reward_weights:
- 1.0
# save_strategy: "epoch"
save_steps: 400    
save_total_limit: 2
seed: 42
do_eval: false
warmup_ratio: 0.1
